<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EduKlase – Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-box">
    <h1>EduKlase</h1>
    <p>Электронная система учебного заведения</p>

    <form>
        <label>Логин</label>
        <input type="text" placeholder="Введите логин">

        <label>Пароль</label>
        <input type="password" placeholder="Введите пароль">

        <button type="submit">Войти</button>
    </form>
</div>

</body>
</html>
